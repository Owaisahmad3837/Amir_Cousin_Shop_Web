<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>News Detail</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #f4f6fb, #eef2ff);
      font-family: "Segoe UI", sans-serif;
    }

    .news-card {
      max-width: 850px;
      margin: 40px auto;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 35px rgba(0,0,0,0.08);
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .news-img {
      width: 100%;
      height: 320px;
      object-fit: cover;
    }

    .content {
      padding: 25px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 10px;
    }

    .date {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    .detail {
      font-size: 16px;
      line-height: 1.8;
      color: #374151;
    }

    .back-btn {
      margin-top: 25px;
      display: inline-block;
      padding: 10px 18px;
      border-radius: 10px;
      background: #6c757d;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: #495057;
      transform: scale(1.03);
    }

    /* 📱 Mobile Optimization */
    @media (max-width: 768px) {
      .news-card {
        margin: 15px;
      }

      .news-img {
        height: 220px;
      }

      .title {
        font-size: 22px;
      }

      .detail {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="news-card">

    <img class="news-img"
         src="{{ url_for('static', filename='uploads/' + news[3]) }}"
         alt="news image">

    <div class="content">

      <div class="title">{{ news[1] }}</div>

      <div class="date">📅 {{ news[2] }}</div>

      <div class="detail">
        {{ news[4] }}
      </div>

      <a href="/news" class="back-btn">
        ← Back to News
      </a>

    </div>

  </div>

</div>

</body>
</html>

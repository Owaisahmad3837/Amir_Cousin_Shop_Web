<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Data</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.back-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  background: #16a34a;
  color: white;
  padding: 10px 16px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 600;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  transition: 0.3s;
  z-index: 999;
}

.back-btn:hover {
  background: #15803d;
  transform: scale(1.05);
  color: white;
}

    body {
      background: #f4f6fb;
      font-family: Arial;
    }

    .card-box {
      border: none;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .title {
      font-weight: bold;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>
<a href="javascript:history.back()" class="back-btn">
  ← Back
</a>
<div class="container py-4">

  <h2 class="text-center mb-4">➕ Admin Add Panel</h2>

  <div class="row g-4">

    <!-- PRODUCT FORM -->
    <div class="col-md-6">

      <div class="card card-box p-3">

        <h4 class="title">🛒 Add Product</h4>

<form method="POST" enctype="multipart/form-data">
          <input type="text" name="title" class="form-control mb-2" placeholder="Product Title" required>
<input type="file" name="image" class="form-control mb-2" required>
          <input type="number" name="quantity" class="form-control mb-2" placeholder="Quantity" required>

          <input type="number" name="price" class="form-control mb-2" placeholder="Price" required>

          <textarea name="detail" class="form-control mb-2" placeholder="Detail"></textarea>

          <button type="submit" name="product_submit" class="btn btn-success w-100">
            Add Product
          </button>

        </form>

      </div>

    </div>

    <!-- NEWS FORM -->
    <div class="col-md-6">

      <div class="card card-box p-3">

        <h4 class="title">📰 Add News</h4>

<form method="POST" enctype="multipart/form-data">

<input type="text" name="title" class="form-control mb-2" placeholder="News Title" required>

<input type="date" name="date" class="form-control mb-2" required>

<input type="file" name="image" class="form-control mb-2" required>

<textarea name="detail" class="form-control mb-2" placeholder="News Detail"></textarea>

<button type="submit" name="news_submit" class="btn btn-primary w-100">
  Add News
</button>

</form>

      </div>

    </div>

  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

  
  body {
      font-family: 'Inter', sans-serif;
      background: #f4f6fb;
    }

    .title {
      font-weight: 800;
      text-align: center;
      margin: 25px 0;
      font-size: 28px;
    }

    /* CARD */
    .news-card {
      border: none;
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      transition: 0.3s;
    }

    .news-card:hover {
      transform: translateY(-6px);
    }

    /* IMAGE AREA */
    .news-img {
      height: 180px;
      background: linear-gradient(135deg, #dbeafe, #e0f2fe);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
    }

    /* CONTENT */
    .news-body {
      padding: 15px;
    }

    .news-title {
      font-weight: 700;
      font-size: 18px;
    }

    .news-date {
      font-size: 12px;
      background: #0ea5e9;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      display: inline-block;
    }

    .news-text {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
    }

    /* BUTTON */
    .read-btn {
      border-radius: 12px;
      font-weight: 600;
    }

    /* MOBILE IMPROVEMENT */
    @media (max-width: 768px) {
      .news-img {
        height: 150px;
      }

      .title {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
 

<div class="container py-4">

  <h2 class="title">📰 تازہ خبریں</h2>

  <div class="row g-3">

    {% for n in news %}
    <div class="col-12 col-md-6 col-lg-4">

      <div class="news-card">

        <!-- IMAGE -->
        <div class="news-img">
        <img src="{{ url_for('static', filename='uploads/' + n[3]) }}"
     class="w-100"
     style="height:180px; object-fit:cover;">
        </div>

        <!-- BODY -->
        <div class="news-body">

          <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="news-date">{{ n[2] }}</span>
          </div>

          <div class="news-title">
            {{ n[1] }}
          </div>

          <div class="news-text">
            {{ n[4] }}
          </div>

          <a href="/news/{{ n[0] }}" class="btn btn-primary w-100 mt-3 read-btn">
    مزید پڑھیں →
</a>

        </div>

      </div>

    </div>
    {% endfor %}

  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #f6f7fb;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    /* LEFT TEXT */
    .hero-text {
      padding: 60px;
    }

    .hero-text h1 {
      font-size: 48px;
      font-weight: 800;
    }

    .hero-text h2 {
      color: #16a34a;
      font-weight: 600;
      margin-top: 10px;
    }

    .hero-text h3 {
      color: #555;
      font-size: 18px;
    }

    .hero-text p {
      margin-top: 15px;
      color: #444;
      line-height: 1.6;
    }

    .btn-main {
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 12px;
      font-weight: 600;
    }

    /* RIGHT IMAGE FULL */
    .hero-img {
      height: 100vh;
      background: url('/static/image/amir.png') center/cover no-repeat;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
      }

      .hero-text {
        padding: 30px 20px;
        text-align: center;
      }

      .hero-text h1 {
        font-size: 30px;
      }

      .hero-img {
        width: 100%;
        height: 250px;
      }
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row g-0 hero">

    <!-- TEXT -->
    <div class="col-md-6 d-flex align-items-center">
      <div class="hero-text">
        <h1>Welcome Everyone 👋</h1>
        <h2>Doctor Amir Ghawher</h2>
        <h3>Alim & BS in Natural Pharmacy</h3>

        <p>
          This is my page. All my products and updates are available here.
          I provide natural remedies and trusted guidance 🌿
        </p>

        <a href="/products" class="btn btn-success btn-main">
          🛒 View Products
        </a>
      </div>
    </div>

    <!-- IMAGE -->
    <div class="col-md-6 hero-img"></div>

  </div>
</div>

</body>
</html>

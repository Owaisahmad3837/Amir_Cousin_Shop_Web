<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #d1fae5, #f0fdf4);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.1);
    }

    .title {
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
    }

    .form-control {
      border-radius: 12px;
      padding: 12px;
    }

    .btn-login {
      border-radius: 12px;
      padding: 10px;
      font-weight: 600;
    }

    /* MOBILE */
    @media (max-width: 576px) {
      .login-card {
        margin: 20px;
        padding: 25px;
      }
    }
  </style>
</head>

<body>

<div class="login-card">

  <h3 class="title">🔐 لاگ ان</h3>

  <form method="POST">

    <!-- EMAIL -->
    <div class="mb-3">
      <label class="form-label">ای میل</label>
      <input type="email" name="gmail" class="form-control" placeholder="example@gmail.com" required>
    </div>

    <!-- PASSWORD -->
    <div class="mb-3">
      <label class="form-label">پاس ورڈ</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required>
    </div>

    <!-- BUTTON -->
    <button type="submit" class="btn btn-success w-100 btn-login">
      داخل ہوں
    </button>

  </form>

</div>

</body>
</html>

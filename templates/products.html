<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

 <style>


  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #f6f7fb, #eef2ff);
  }

  .title {
    font-weight: 800;
    margin-bottom: 30px;
    font-size: 28px;
  }

  /* CARD */
  .product-card {
    border: none;
    border-radius: 18px;
    background: #fff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    transition: all 0.3s ease;
    overflow: hidden;
  }

  .product-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
  }

  /* IMAGE BOX */
  .product-img {
    height: 200px;
    width: 100%;
    overflow: hidden;
    background: #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .product-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s;
  }

  .product-card:hover .product-img img {
    transform: scale(1.05);
  }

  /* PRICE */
  .price {
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: white;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
  }

  /* BUTTON */
  .order-btn {
    border-radius: 12px;
    font-weight: 600;
    padding: 10px;
    background: linear-gradient(135deg, #25D366, #128C7E);
    border: none;
  }

  .order-btn:hover {
    opacity: 0.9;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .product-img {
      height: 160px;
    }

    .title {
      font-size: 22px;
    }

    .product-card {
      border-radius: 15px;
    }
  }
</style>
</head>

<body>

<div class="container py-4">

  <h2 class="text-center title">🛒 ہمارے پروڈکٹس</h2>

  <div class="row g-3">

    {% for p in products %}
    <div class="col-12 col-md-6 col-lg-4">

      <div class="card product-card">

        <!-- IMAGE AREA -->
 <div class="product-img">
  <img src="{{ url_for('static', filename='uploads/' + p[2]) }}" alt="product">
 </div>

<div class="p-3">

  <h5 class="fw-bold">{{ p[1] }}</h5>

  <p class="text-muted small">{{ p[5] }}</p>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <span>Qty: <b>{{ p[3] }}</b></span>
    <span class="price">Rs {{ p[4] }}</span>
  </div>

  <a href="https://wa.me/923189545473?text=I%20want%20to%20order%20{{ p[1] }}"
     target="_blank"
     class="btn order-btn w-100 text-white">
    🛒 WhatsApp Order
  </a>

</div>

      </div>

    </div>
    {% endfor %}

  </div>

</div>

</body>
</html>

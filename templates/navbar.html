<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding-top: 70px; /* FIX: navbar overlap issue */
    }

    .navbar {
      background: #d1fae5;
    }

    .nav-hover {
      transition: 0.3s;
      font-weight: 500;
    }

    .nav-hover:hover {
      color: #15803d !important;
      transform: translateY(-2px);
    }

    /* MOBILE MENU STYLE */
    .offcanvas {
      background: #f8fafc;
    }

    /* BUTTON LOOK */
    .login-btn {
      border-radius: 50px;
      padding: 6px 18px;
    }

    /* MOBILE IMPROVEMENT */
    @media (max-width: 768px) {
      body {
        padding-top: 65px;
      }

      .navbar-brand {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm fixed-top">

  <div class="container-fluid">

    <!-- BRAND -->
    <a class="navbar-brand fw-bold text-dark" href="{{ url_for('index') }}">
      🛍 Amir Shop
    </a>

    <!-- MOBILE TOGGLE -->
    <button class="navbar-toggler border-0 d-lg-none" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- DESKTOP MENU -->
    <div class="d-none d-lg-flex align-items-center ms-auto gap-4">

      <a class="nav-link text-dark nav-hover" href="{{ url_for('index') }}">🏠 Home</a>
      <a class="nav-link text-dark nav-hover" href="{{ url_for('aboutme') }}">ℹ️ About</a>
      <a class="nav-link text-dark nav-hover" href="{{ url_for('products_page') }}">🛒 Products</a>
      <a class="nav-link text-dark nav-hover" href="{{ url_for('news_page') }}">📰 News</a>

      <a href="{{ url_for('login') }}" class="btn btn-success login-btn">
        👤 Login
      </a>

    </div>

  </div>

  <!-- MOBILE OFFCANVAS -->
  <div class="offcanvas offcanvas-end d-lg-none" id="menu">

    <div class="offcanvas-header">
      <h5 class="fw-bold">🛍 Amir Shop</h5>
      <button class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">

      <ul class="navbar-nav gap-2">

        <li><a class="nav-link" href="{{ url_for('index') }}">🏠 Home</a></li>
        <li><a class="nav-link" href="{{ url_for('aboutme') }}">ℹ️ About</a></li>
        <li><a class="nav-link" href="{{ url_for('products_page') }}">🛒 Products</a></li>
        <li><a class="nav-link" href="{{ url_for('news_page') }}">📰 News</a></li>

        <hr>

        <li>
          <a href="{{ url_for('login') }}" class="btn btn-success w-100">
            👤 Login
          </a>
        </li>

      </ul>

    </div>
  </div>

</nav>

<!-- Bootstrap JS (IMPORTANT for mobile menu) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
